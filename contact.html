<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vertex Infra - Contact Us</title>
    <link rel="stylesheet" href="styles.css" />
    <link 
      href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" 
      rel="stylesheet" 
    />
    <style>
      .social-icons {
        margin-top: 1.5em;
      }
      .social-icons a {
        margin-right: 1em;
        font-size: 1.5rem;
        color: #333;
        text-decoration: none;
        transition: color 0.3s ease;
      }
      .social-icons a:hover {
        color: #0077b5;
      }
    </style>
</head>
<body>
<header>
    <h1>Vertex Infra</h1>
    <nav>
        <a href="index.html">About</a>
        <a href="customers.html">Our Customers</a>
        <a href="contact.html">Contact Us</a>
    </nav>
</header>

<main class="container">
    <h2>Contact Us</h2>
    <p>If you have any questions or would like to learn more about our MSP infrastructure services, please reach out to us!</p>

    <form id="contactForm">
        <label for="name">Your Name</label>
        <input type="text" id="name" name="name" required />

        <label for="email">Your Email</label>
        <input type="email" id="email" name="email" required />

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <button type="submit">Send Message</button>
    </form>

    <nav class="social-icons" aria-label="Social media links">
        <!--<a href="mailto:contact@vertexinfra.tech" title="Email Us"><i class="fas fa-envelope"></i></a> -->
        <a href="https://twitter.com/" target="_blank" rel="noopener" title="X (Twitter)"><i class="fab fa-twitter"></i></a>
        <a href="https://github.com/vertexinfra" target="_blank" rel="noopener" title="GitHub"><i class="fab fa-github"></i></a>
        <a href="https://linkedin.com/" target="_blank" rel="noopener" title="LinkedIn"><i class="fab fa-linkedin"></i></a>
    </nav>
</main>

<footer>
    &copy; 2024 Vertex Infra. All rights reserved.
</footer>

<script>
  document.getElementById('contactForm').addEventListener('submit', function(event) {
    event.preventDefault();

    const message = encodeURIComponent(document.getElementById('message').value.trim());
    const mailto_link = `mailto:contact@vertexinfra.tech?body=${message}`;

    window.location.href = mailto_link;
  });
</script>

</body>
</html>
